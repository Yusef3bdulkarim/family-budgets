<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .progress-fill {
            transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen flex flex-col items-center">

<div class="w-full h-11 flex justify-between items-center px-6 safe-top z-50">
<div class="font-bold text-sm">9:41</div>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-sm">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-sm">wifi</span>
<span class="material-symbols-outlined text-sm rotate-90">battery_full</span>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[393px] px-container-margin flex flex-col items-center justify-between py-stack-lg relative">
<!-- Illustration Section -->
<div class="w-full aspect-[4/5] relative flex items-center justify-center mt-stack-md">
<!-- Background Decorative Elements -->
<div class="absolute w-[120%] h-[120%] -z-10 opacity-30 pointer-events-none">
<div class="absolute top-10 left-10 w-32 h-32 bg-secondary-fixed rounded-full blur-[60px]"></div>
<div class="absolute bottom-10 right-10 w-40 h-40 bg-tertiary-fixed rounded-full blur-[70px]"></div>
</div>
<!-- Central Composition -->
<div class="relative w-full h-full flex flex-col items-center justify-center">
<!-- 3D Family Illustration Component -->
<div class="w-full h-full rounded-[24px] overflow-hidden bg-surface-container-lowest shadow-lg relative group">
<img alt="Happy 3D family celebrating financial success" class="w-full h-full object-cover" data-alt="A premium 3D rendered illustration of a diverse, joyful family of three—a mother, father, and young child—cheering with arms raised in a minimalist white-walled living room. In the foreground, a sleek digital floating progress bar glows neon green, showing 100% completion for a 'Family Vacation' goal. A stylized translucent purple piggy bank icon floats nearby, catching the soft, studio-quality light. The scene is bright, high-key, and evokes a sense of modern financial freedom and collective achievement." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAB5y6cyTlpxho8rsurGvb7WVM2RhNT-uTEkNoE9ARdflSqqS9ICp7aZQ4bhQ-Mx4X-VIsYTd4tRU8P_8OBLNJwsdftJEj75KsQhFhR9jypNBQTxqStibLN3jN3Xmf_dbUhnR1MnsCKuoKcXnNRlSouds7zEewl9bXWjtL8AQqoSDw43AlYDRUoIw1ic_g9oss3zlh6VgF0KRyihSyyIUec_bW8i6XwmS7sDoifWHzkhQNgU5-i_TULTfw-RK-blMmJFtOz4dI4Ymk">
<!-- Floating Progress Overlay -->
<div class="absolute bottom-6 left-6 right-6 glass-card p-stack-md rounded-xl shadow-md border border-white/40 animate-float">
<div class="flex justify-between items-center mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant" style="font-variation-settings: 'FILL' 1;">savings</span>
<span class="font-label-lg text-on-surface">Family Vacation</span>
</div>
<span class="text-secondary font-bold font-label-lg">100%</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-secondary progress-fill" id="progressBar" style="width: 0%"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="text-center w-full mt-stack-lg">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight px-4">
                Build better financial habits together
            </h1>
<p class="font-body-md text-on-surface-variant mt-stack-sm max-w-[280px] mx-auto">
                Track shared goals, manage budgets, and secure your family's future in one calm space.
            </p>
</div>
<!-- Onboarding Navigation & CTA -->
<div class="w-full flex flex-col items-center mt-stack-lg pb-stack-lg">
<!-- Pagination Dots -->

<div class="w-1.5 h-1.5 rounded-full bg-surface-container-highest"></div>

</div>
<!-- CTA Button -->
<button class="w-full bg-secondary text-on-secondary font-headline-md text-headline-md py-4 rounded-full shadow-lg active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 group">
                Get Started
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Safe Area Spacer -->
<div class="safe-bottom"></div>
<script>
        // Trigger progress bar animation on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const bar = document.getElementById('progressBar');
                if (bar) bar.style.width = '100%';
            }, 500);
        });

        // Simple button interaction feedback
        const btn = document.querySelector('button');
        btn.addEventListener('touchstart', () => {
            btn.classList.add('opacity-90');
        });
        btn.addEventListener('touchend', () => {
            btn.classList.remove('opacity-90');
        });
    </script>
