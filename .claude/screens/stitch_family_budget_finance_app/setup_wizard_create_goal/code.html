<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Family Setup Wizard - Step 4</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind Configuration -->
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-secondary-fixed-variant": "#005312",
            "on-secondary-fixed": "#002204",
            "error-container": "#ffdad6",
            "on-background": "#191c1d",
            "outline": "#75777f",
            "surface": "#f8f9fa",
            "inverse-surface": "#2e3132",
            "on-primary-fixed": "#081b3a",
            "surface-variant": "#e1e3e4",
            "surface-tint": "#4e5e81",
            "on-primary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "on-tertiary": "#ffffff",
            "on-tertiary-fixed-variant": "#721199",
            "surface-container-high": "#e7e8e9",
            "surface-container": "#edeeef",
            "secondary-fixed": "#a3f69c",
            "on-secondary-container": "#217128",
            "on-error": "#ffffff",
            "tertiary-fixed-dim": "#ebb2ff",
            "on-secondary": "#ffffff",
            "inverse-on-surface": "#f0f1f2",
            "surface-bright": "#f8f9fa",
            "background": "#f8f9fa",
            "primary-fixed-dim": "#b6c6ef",
            "on-tertiary-container": "#c66ced",
            "surface-container-highest": "#e1e3e4",
            "on-tertiary-fixed": "#320047",
            "surface-container-low": "#f3f4f5",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#88d982",
            "primary": "#031635",
            "secondary": "#1b6d24",
            "on-surface-variant": "#44474e",
            "on-primary-fixed-variant": "#364768",
            "on-error-container": "#93000a",
            "primary-fixed": "#d8e2ff",
            "on-surface": "#191c1d",
            "inverse-primary": "#b6c6ef",
            "tertiary-fixed": "#f8d8ff",
            "tertiary-container": "#4a0067",
            "surface-dim": "#d9dadb",
            "primary-container": "#1a2b4b",
            "outline-variant": "#c5c6cf",
            "on-primary-container": "#8293b8",
            "secondary-container": "#a0f399",
            "tertiary": "#2b003d"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px",
            "card": "24px"
          },
          "spacing": {
            "section-padding": "32px",
            "stack-md": "16px",
            "gutter": "16px",
            "stack-lg": "24px",
            "stack-sm": "8px",
            "container-margin": "20px"
          },
          "fontFamily": {
            "display-lg": ["Inter"],
            "body-md": ["Inter"],
            "label-md": ["Inter"],
            "body-lg": ["Inter"],
            "headline-lg": ["Inter"],
            "label-lg": ["Inter"],
            "headline-md": ["Inter"],
            "display-lg-mobile": ["Inter"]
          },
          "fontSize": {
            "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
            "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
            "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "label-lg": ["13px", {"lineHeight": "18px", "letterSpacing": "0.04em", "fontWeight": "600"}],
            "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "display-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .custom-shadow {
      box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
    }
    .active-shadow {
      box-shadow: 0 8px 30px 0 rgba(0, 0, 0, 0.08);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Step 4 TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface dark:bg-surface-dim shadow-[0_4px_20px_0_rgba(0,0,0,0.04)] flex items-center justify-between px-container-margin h-16">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md text-primary dark:text-primary-fixed">Step 4 of 5</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-[393px] px-container-margin pt-stack-lg pb-40 flex flex-col gap-section-padding">
<!-- Hero Section -->
<section class="flex flex-col gap-stack-md text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Create your family goal</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Save together and build better financial habits as a family</p>
</section>
<!-- Illustration Area -->
<div class="relative w-full aspect-square rounded-card overflow-hidden active-shadow bg-white">
<img alt="Family celebrating a financial goal achievement" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2TrdTZIsPhBRitMF8vMywbk9BrRdwcvq4TyxqK7fjpe_CDE0O6mD9FGIedljU26fkmUfo0HEZ1A0keGh0wU2oSobqI-U17gpoS-4qK5EvvWjpzaNfyERK3DQSxbK8hbq0sSXPXrXSIyUI2kj0kgGZ5fNync0yMUT_c3_i875IsUi9vOXOtwBO-lnLx8Ih83ESTifeJtPtyWbHVLBlCRNYUFSMtYqBxf8E-fRnLDh_bzzw8YbOuwxzKuv69JnMFSpw5bkPWAsIv38">
</div>
<!-- Motivation Card -->
<div class="bg-secondary-container bg-opacity-30 rounded-card p-5 flex items-center gap-4 border border-secondary-container">
<div class="bg-on-secondary-container bg-opacity-10 p-2 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="auto_awesome">auto_awesome</span>
</div>
<p class="font-label-lg text-label-lg text-on-secondary-container leading-snug">
        Every saving step brings your family closer to the goal
      </p>
</div>
<!-- Goal Creation Form -->
<form class="flex flex-col gap-stack-lg">
<!-- Goal Name -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Goal Name</label>
<div class="relative">
<input class="w-full h-14 bg-white border border-outline-variant rounded-xl px-4 font-body-md text-body-md focus:border-primary focus:ring-0 transition-all outline-none" placeholder="e.g. Dream House Fund" type="text">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="edit">edit</span>
</div>
</div>
<!-- Target Amount & Date Row -->
<div class="grid grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Target Amount</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-primary">$</span>
<input class="w-full h-14 bg-white border border-outline-variant rounded-xl pl-8 pr-4 font-body-md text-body-md focus:border-primary focus:ring-0 transition-all outline-none" placeholder="0.00" type="number">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Target Date</label>
<div class="relative">
<input class="w-full h-14 bg-white border border-outline-variant rounded-xl px-4 font-body-md text-body-md focus:border-primary focus:ring-0 transition-all outline-none" placeholder="MM/DD/YYYY" type="text">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
<!-- Goal Category/Highlight (Purple accent based on prompt) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Category</label>
<div class="flex gap-stack-sm overflow-x-auto pb-2 -mx-1 px-1 no-scrollbar">
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-tertiary-fixed-dim bg-tertiary-fixed-dim bg-opacity-20 text-on-tertiary-fixed-variant font-label-lg flex items-center gap-2 transition-all hover:bg-opacity-40" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="home">home</span>
            Housing
          </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-white text-on-surface-variant font-label-lg flex items-center gap-2 transition-all hover:border-primary" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="flight">flight</span>
            Travel
          </button>
<button class="flex-shrink-0 px-4 py-2 rounded-full border border-outline-variant bg-white text-on-surface-variant font-label-lg flex items-center gap-2 transition-all hover:border-primary" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="school">school</span>
            Education
          </button>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Description (Optional)</label>
<textarea class="w-full bg-white border border-outline-variant rounded-xl p-4 font-body-md text-body-md focus:border-primary focus:ring-0 transition-all outline-none resize-none" placeholder="Tell your family what we're saving for..." rows="3"></textarea>
</div>
</form>
</main>
<!-- Bottom Navigation Actions -->
<footer class="fixed bottom-0 left-0 w-full px-container-margin pb-8 pt-4 flex justify-between items-center gap-stack-md bg-white dark:bg-surface-container-highest shadow-[0_-4px_20px_0_rgba(0,0,0,0.04)] rounded-t-xl z-50 safe-area-bottom">
<button class="flex flex-row items-center justify-center text-primary dark:text-primary-fixed-dim px-6 py-3 border border-primary dark:border-primary-fixed-dim rounded-full font-label-lg text-label-lg hover:brightness-110 active:scale-98 transition-all duration-200">
      Skip for now
    </button>
<button class="flex flex-row items-center justify-center bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container rounded-full px-8 py-4 font-label-lg text-label-lg shadow-lg hover:brightness-110 active:scale-98 transition-all duration-200 gap-2">
<span>Create Goal</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<script>
    // Micro-interaction for inputs
    const inputs = document.querySelectorAll('input, textarea');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('active-shadow');
      });
      input.addEventListener('blur', () => {
        input.parentElement.classList.remove('active-shadow');
      });
    });

    // Category selection logic
    const categoryButtons = document.querySelectorAll('button[type="button"]');
    categoryButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryButtons.forEach(b => {
          b.classList.remove('bg-tertiary-fixed-dim', 'bg-opacity-20', 'text-on-tertiary-fixed-variant', 'border-tertiary-fixed-dim');
          b.classList.add('bg-white', 'text-on-surface-variant', 'border-outline-variant');
        });
        btn.classList.add('bg-tertiary-fixed-dim', 'bg-opacity-20', 'text-on-tertiary-fixed-variant', 'border-tertiary-fixed-dim');
        btn.classList.remove('bg-white', 'text-on-surface-variant', 'border-outline-variant');
      });
    });
  </script>
</body></html>
