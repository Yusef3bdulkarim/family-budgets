        }
        .role-card.selected {
            border-color: #031635; /* Primary color */

            transform: scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(3, 22, 53, 0.1);

        }
        .safe-bottom {

        }

<body class="bg-background text-on-surface antialiased selection:bg-primary-fixed">

<!-- Role Cards List -->
<div class="space-y-stack-md" id="roleContainer">

<h3 class="font-headline-md text-headline-md text-primary">Family Manager</h3>
<div class="check-indicator opacity-0 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>

</div>
<p class="font-body-md text-body-md text-on-surface-variant leading-tight mt-1">

                    </p>

</button>

                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
<!-- Bottom Navigation (Shared Component Placeholder - Suppressed per Relevance Check for Transactional Onboarding) -->
<script>
        function selectRole(element) {
            // Remove selection from all cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add selection to clicked card
            element.classList.add('selected');
            
            // Enable the continue button
            const continueBtn = document.getElementById('continueBtn');
            continueBtn.disabled = false;
            continueBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-surface-container-high', 'text-on-surface-variant');
            continueBtn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg', 'active:scale-95');
            
            // Subtle haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Add a bit of visual flair on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-sm', 'bg-opacity-95', 'backdrop-blur-md');
            } else {
                header.classList.remove('shadow-sm', 'bg-opacity-95', 'backdrop-blur-md');
            }
        });
    </script>
