<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Family Budget - Create Reward</title>

                        "on-tertiary-fixed-variant": "#721199",
                        "on-surface-variant": "#44474e",

                        "on-tertiary-container": "#c66ced",
                        "on-secondary": "#ffffff",
                        "outline": "#75777f",
                        "surface-container-high": "#e7e8e9",
                        "inverse-surface": "#2e3132",
                        "surface-variant": "#e1e3e4",
                        "tertiary-fixed-dim": "#ebb2ff",
                        "secondary-container": "#a0f399",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container": "#edeeef",
                        "on-primary-fixed": "#081b3a",
                        "surface-bright": "#f8f9fa",
                        "primary": "#031635",
                        "on-secondary-fixed": "#002204",
                        "on-background": "#191c1d",
                        "on-tertiary-fixed": "#320047",
                        "surface-dim": "#d9dadb",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container-highest": "#e1e3e4",
                        "primary-fixed-dim": "#b6c6ef",
                        "inverse-primary": "#b6c6ef",
                        "secondary": "#1b6d24",
                        "on-primary": "#ffffff",
                        "tertiary": "#2b003d",
                        "on-primary-fixed-variant": "#364768",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#f8d8ff",
                        "secondary-fixed": "#a3f69c",
                        "background": "#f8f9fa",
                        "tertiary-container": "#4a0067",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#005312",
                        "on-secondary-container": "#217128",
                        "outline-variant": "#c5c6cf",
                        "error-container": "#ffdad6",
                        "surface": "#f8f9fa",
                        "primary-container": "#1a2b4b",
                        "on-surface": "#191c1d",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-padding": "32px",
                        "container-margin": "20px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"],

                        "body-lg": ["Inter"],
                        "display-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "label-lg": ["13px", {"lineHeight": "18px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<div class="w-full max-w-md bg-background min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Top Navigation -->
<header class="w-full sticky top-0 z-50 bg-background flex items-center justify-between px-container-margin h-16">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="font-headline-md text-headline-md-mobile text-primary">Step 5 of 5</h2>
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<main class="flex-1 px-container-margin pb-32">
<!-- Hero Illustration -->
<section class="mt-stack-md flex justify-center">
<div class="relative w-full aspect-square max-w-[280px] flex items-center justify-center">
<img alt="Family celebrating financial growth together" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDjOD29cDqNvDkwAKGPZ9v6J_5bkk23IovfIWfEHxEfFX_h2slECz9ZVikL2FqsxOaA3Ckb1_Ly_qklWN5uKR9GS_A3sIH6L_zu9IPy_GQwLDhi4QeVjprRhxptMOwbVTX1nIQH96DNj3pSeK98d4VAAt842vSCynCJ6gFV-0LIExtbtH37MqMdoGILzMXQF70pnQxkpPKCLVK-6nF9QVm5ezFjv8BWZi9kH8mhtAtnLObWjaAdd6XEWFfWftO6hoX1ojaRXHvhLI">
<!-- Dynamic Accent Element -->
<div class="absolute -top-2 -right-2 bg-tertiary text-on-tertiary px-3 py-1 rounded-full text-label-md flex items-center gap-1 shadow-lg animate-bounce">
<span class="material-symbols-outlined text-[14px]">stars</span>
                        New Reward
                    </div>
</div>
</section>
<!-- Header Content -->
<section class="mt-stack-lg text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">Create a family reward</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 max-w-[80%] mx-auto">
                    Encourage better money habits with meaningful rewards.
                </p>
</section>
<!-- Reward Logic Hint -->
<section class="mt-stack-lg">
<div class="bg-surface-container flex items-center gap-3 p-4 rounded-xl border border-outline-variant/30 transition-all hover:bg-surface-container-high">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined">savings</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-surface">Save money → Earn points</p>
<p class="font-label-md text-label-md text-on-surface-variant">Points unlock your custom rewards</p>
</div>
</div>
</section>
<!-- Form Fields -->
<form class="mt-section-padding space-y-stack-lg">
<!-- Reward Title -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface ml-1">Reward Title</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-body-md" placeholder="e.g. Family Pizza Night" type="text">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">edit</span>
</div>
</div>
<!-- Description -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface ml-1">Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-body-md" placeholder="Explain what the reward is for..." rows="3"></textarea>
</div>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-gutter">
<!-- Target Points -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface ml-1">Target Points</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-body-md" placeholder="500" type="number">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-tertiary-container">stars</span>
</div>
</div>
<!-- Assign to Member -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface ml-1">Assign to</label>
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-[1.125rem] focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md text-body-md appearance-none">
<option>Whole Family</option>
<option>Daughter</option>
<option>Son</option>
</select>
</div>
</div>
<!-- Quick Selection Chips -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface ml-1">Popular Targets</label>
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface text-label-lg hover:border-primary transition-colors" type="button">100 pts</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface text-label-lg hover:border-primary transition-colors" type="button">250 pts</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-primary bg-primary-container text-on-primary-container text-label-lg" type="button">500 pts</button>
<button class="whitespace-nowrap px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface text-label-lg hover:border-primary transition-colors" type="button">1000 pts</button>
</div>
</div>
</form>
</main>
<!-- Bottom Actions -->
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-surface p-container-margin pb-safe z-50 rounded-t-xl shadow-[0_-4px_20px_0_rgba(0,0,0,0.04)]">
<div class="flex flex-col gap-3">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary font-label-lg text-label-lg rounded-full py-4 px-6 hover:opacity-90 active:scale-[0.98] transition-all duration-200">
                    Create Reward
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<button class="w-full flex items-center justify-center gap-2 text-on-surface-variant font-label-lg text-label-lg py-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">close</span>
                    Skip for now
                </button>
</div>
</footer>
</div>
<script>
        // Micro-interaction: Form input focus effect
        document.querySelectorAll('input, textarea, select').forEach(element => {
            element.addEventListener('focus', () => {
                element.parentElement.closest('div').classList.add('scale-[1.01]');
                element.parentElement.closest('div').style.transition = 'transform 0.2s ease-out';
            });
            element.addEventListener('blur', () => {
                element.parentElement.closest('div').classList.remove('scale-[1.01]');
            });
        });

        // Chip selection logic
        const chips = document.querySelectorAll('.hide-scrollbar button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('border-primary', 'bg-primary-container', 'text-on-primary-container');
                    c.classList.add('border-outline-variant', 'bg-surface-container-low', 'text-on-surface');
                });
                chip.classList.add('border-primary', 'bg-primary-container', 'text-on-primary-container');
                chip.classList.remove('border-outline-variant', 'bg-surface-container-low', 'text-on-surface');
                
                // Update target points input
                const pts = chip.innerText.split(' ')[0];
                const input = document.querySelector('input[type="number"]');
                if (input) input.value = pts;
            });
        });
    </script>
</body></html>
