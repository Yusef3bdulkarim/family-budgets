<style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

<body class="flex flex-col min-h-screen text-on-background">
<!-- Main Content Area (iPhone 15 Pro Canvas) -->
<main class="flex-1 flex flex-col items-center px-container-margin pt-stack-lg">
<!-- Illustration Container -->
<div class="w-full flex-1 flex items-center justify-center mb-stack-lg relative overflow-hidden">
<!-- Animated Ambient Background Layer -->
<div class="absolute inset-0 opacity-40 z-0">

</div>
<!-- Illustration with 3D characters -->
<div class="relative z-10 w-full max-w-[320px] aspect-square rounded-[32px] overflow-hidden">
<img alt="Family budget request illustration" class="w-full h-full object-cover" data-alt="A high-end 3D character render in a minimalist studio setting. A cheerful young boy holds up a smartphone showing a clean white digital card labeled 'New Bike $150' with a bike icon. Standing beside him, a father figure looks at his own phone which displays a prominent green 'Approve' button. The scene uses a soft, warm color palette of deep navy, clean white, and gentle greens. The lighting is bright and airy with soft ambient shadows, creating a trustworthy and organized family atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD70rhPyo1u9xVkgBVK6oq5FZxG80nb8qI_Cqf6_Utht57ZiqbZBnDVbhlN0uYGb5khXBnopy44owtrtVZE98luIaUz88XOAiv9vxSVNwnJUZJ1iR6GKrm1SdlUdXCPxYSjqcrhRLKvcsPA_ZF_8uwDibrELZWgbgaLe4oTouitmLoUuKIMZSUAoRx-sB8OOgWoMeIqI8HdLsIB74GWHT58VDwdKs8YSyXXG6fPX4aqzOiUWIG4RmBRPq2B3q3s0r1RQOXo_bGGCtU">
</div>
</div>
<!-- Copy Content -->
<div class="w-full text-center mb-section-padding">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-stack-sm leading-tight px-2">
                Make family money requests easier and more organized
            </h1>
</div>
<!-- Pagination & Actions -->
<div class="w-full mt-auto pb-10 flex flex-col items-center">
<!-- Pagination Indicator -->
<div class="flex items-center gap-2 mb-stack-lg">
<div class="pagination-dot bg-outline-variant rounded-full"></div>
<div class="pagination-pill bg-primary rounded-full"></div>
<div class="pagination-dot bg-outline-variant rounded-full"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-5 rounded-xl shadow-lg active:scale-95 transition-transform duration-200">
                Next
            </button>
<!-- Safe Area Indicator Space -->
<div class="h-4"></div>
</div>
</main>
<!-- Invisible Shell Handling for BottomNavBar Suppression (As per task requirements for transactional/onboarding pages) -->
<!-- This screen is part of an onboarding/intro flow, so the shell is suppressed to prioritize the content canvas. -->
<script>
        // Micro-interaction for the button
        document.querySelector('button').addEventListener('click', function(e) {
            const btn = e.currentTarget;
            btn.style.opacity = '0.8';
            setTimeout(() => {
                btn.style.opacity = '1';
                // Logic for navigation would go here
            }, 150);
        });

        // Subtle parallax effect on the illustration
        window.addEventListener('mousemove', (e) => {
            const illustration = document.querySelector('img');
            if(illustration) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                illustration.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
    </script>
</body></html>
