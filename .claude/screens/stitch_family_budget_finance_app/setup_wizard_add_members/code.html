<style>
        body {
            background-color: #F8F9FA;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }
        .ios-shadow {
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
        }
        .bottom-sheet {
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .bottom-sheet.hidden-state {
            transform: translateY(100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pill-active {
            width: 16px;
            height: 6px;
            background-color: #031635;
            border-radius: 99px;
        }
        .pill-inactive {
            width: 6px;
            height: 6px;
            background-color: #E9ECEF;
            border-radius: 99px;
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">
<!-- iPhone 15 Pro Wrapper -->
<main class="w-full max-w-[393px] min-h-[852px] bg-background relative overflow-hidden flex flex-col">
<!-- Top App Bar & Progress -->
<header class="w-full pt-12 px-container-margin z-10">
<div class="flex items-center justify-between mb-stack-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<div class="flex gap-1.5 items-center">
<div class="pill-inactive"></div>
<div class="pill-active"></div>
<div class="pill-inactive"></div>
<div class="pill-inactive"></div>
<div class="pill-inactive"></div>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
<div class="mt-stack-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Add your family members</h1>
<p class="font-body-md text-on-surface-variant mt-stack-sm">Create your family space by adding the people who will use the app</p>
</div>
</header>
<!-- Illustration Component -->
<div class="px-container-margin mt-stack-lg opacity-80 pointer-events-none">
<div class="relative w-full aspect-square rounded-2xl overflow-hidden bg-white/50">
<img alt="Family illustration" class="w-full h-full object-cover" data-alt="A warm and friendly 3D render illustration of a diverse happy family including parents and young children gathered together. The scene is lit with soft, warm golden hour lighting that creates a cozy and trustworthy atmosphere. The style is minimalist with clean surfaces and soft textures, consistent with a high-end financial app aesthetic. The background is a clean, neutral off-white to maintain UI focus." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAu01WMgWq-wg0g0dQPhE_uWI-ESc8QyFVZ_L4YS0ZeMpcvbQEyUjWVdFu6Y8hZ30k8vycNHl-7mjSGoa2KeF6aF16SSosb2ctZd5dq_4eLzfw3_IzULmPsPG7oQVLHgW1HqSsnHuOoSKci1qaUmFtlCJC7sMucRk_s4atYsBb_m0DZa18nf1nAeWtWKVypw9tcW8EU6s4NfoN2xslra9wqzjWXHg5AAqMIejVA7XKrs-TvgUen5ybvHU2GwhWuoHIBl6rydHlOQIU">
</div>
</div>
<!-- Scrollable Content -->
<section class="flex-1 px-container-margin py-section-padding space-y-stack-md overflow-y-auto pb-40">
<!-- Member Cards -->
<div class="bg-surface-container-lowest ios-shadow rounded-2xl p-container-margin flex items-center gap-stack-md border border-outline-variant/20">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-primary">Sarah Ahmed</h3>
<p class="font-label-md text-secondary">Co-Manager</p>
</div>
<button class="text-on-surface-variant">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
<div class="bg-surface-container-lowest ios-shadow rounded-2xl p-container-margin flex items-center gap-stack-md border border-outline-variant/20">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">person</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-primary">Omar Ahmed</h3>
<p class="font-label-md text-on-surface-variant">Family Member</p>
</div>
<button class="text-on-surface-variant">
<span class="material-symbols-outlined">edit</span>
</button>
</div>
<!-- Add Member Button (Dashed) -->
<button class="w-full p-container-margin border-2 border-dashed border-outline-variant rounded-2xl flex items-center justify-center gap-stack-sm text-primary font-label-lg transition-all active:scale-95" onclick="toggleSheet(true)">
<span class="material-symbols-outlined">add_circle</span>
                Add Member
            </button>
</section>
<!-- Fixed Bottom Action -->
<div class="absolute bottom-0 w-full px-container-margin pb-10 pt-4 bg-gradient-to-t from-background via-background to-transparent z-20">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-headline-md shadow-lg active:scale-95 transition-transform">
                Continue
            </button>
</div>
<!-- Bottom Sheet Overlay -->
<div class="fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity duration-300" id="sheet-overlay" onclick="toggleSheet(false)"></div>
<div class="bottom-sheet hidden-state fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[393px] bg-white rounded-t-[32px] z-40 px-container-margin pt-4 pb-12 ios-shadow" id="bottom-sheet">
<!-- Handle -->
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-stack-lg"></div>
<h2 class="font-headline-lg-mobile text-primary mb-stack-lg">New Family Member</h2>
<div class="space-y-stack-lg">
<!-- Name Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-primary">Full Name</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body-md" placeholder="e.g. Layla Ahmed" type="text">
</div>
<!-- Role Selector -->
<div class="space-y-stack-sm">
<label class="font-label-md text-primary">Assign Role</label>
<div class="grid grid-cols-2 gap-stack-md">
<button class="p-4 border-2 border-primary bg-primary-container/10 rounded-xl flex flex-col items-start gap-1">
<span class="font-label-lg text-primary">Co-Manager</span>
<span class="text-[11px] text-on-primary-fixed-variant leading-tight">Can edit budget and add members</span>
</button>
<button class="p-4 border border-outline-variant rounded-xl flex flex-col items-start gap-1 hover:bg-surface-container-low transition-colors">
<span class="font-label-lg text-on-surface">Member</span>
<span class="text-[11px] text-on-surface-variant leading-tight">Can view shared budgets only</span>
</button>
</div>
</div>
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-headline-md mt-4" onclick="toggleSheet(false)">
                    Add to Family
                </button>
</div>
</div>
</main>
<script>
        function toggleSheet(show) {
            const sheet = document.getElementById('bottom-sheet');
            const overlay = document.getElementById('sheet-overlay');
            
            if (show) {
                sheet.classList.remove('hidden-state');
                overlay.classList.remove('pointer-events-none', 'opacity-0');
                overlay.classList.add('opacity-100');
            } else {
                sheet.classList.add('hidden-state');
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        // Mock interaction: ripple effect on buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripple = document.createElement('span');
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body></html>
