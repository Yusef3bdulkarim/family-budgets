<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .tab-active { position: relative; }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #031635;
            border-radius: 9999px;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation { animation: float 6s ease-in-out infinite; }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-background shadow-[0_4px_20px_0_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center px-container-margin py-stack-md w-full">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 transition-transform">
                menu
            </button>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed-dim font-bold">Requests</h1>
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 transition-transform">
                notifications
            </button>
</div>
<!-- Tabs Section -->
<nav class="flex px-container-margin pb-stack-sm gap-stack-lg border-b border-surface-variant/30">
<button class="font-label-lg text-label-lg text-primary font-bold tab-active py-2">Pending</button>
<button class="font-label-lg text-label-lg text-on-surface-variant py-2 hover:text-primary transition-colors">History</button>
</nav>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-padding space-y-stack-lg">
<!-- Illustration Container -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center">
<!-- Background Glow/Atmosphere -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- 3D Family Illustration -->
<div class="relative z-10 float-animation w-4/5 h-4/5">
<img alt="Happy family illustration" class="w-full h-full object-contain" data-alt="A premium 3D digital illustration of a happy, diverse family of four sitting together on a soft, oversized white sofa. The scene is rendered in a realistic claymorphic style with soft lighting and warm tones. The background is a minimalist, clean interior with diffused sunlight filtering through. The overall mood is peaceful, safe, and positive, reflecting a sense of financial stability and family unity in a high-end modern aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnw0RKOpmOxLFwMltQ1T0sbKN2SuDTca_KPdQWZ57QP6HJQwDXeqaLBBFFNLZb6g7NpdHMBROZGRLtC2EqN7AMNU2DiiGLgBLZo-zWKuzJJTb5OUELQW1WD5o21ZfsI0-qh3zhsos8DY04TLvZzx8c4U6F5sFyPPbLxC98HkZ-xARYyRgjl3nvSR9hH7zGSKNM79TxWQl7Tn3nPH6fr2irz7AjwEStt1Dhs94Zb_As5YitpgAGcA5ckCb11knhLbroFHj3u4g3PiM">
</div>
<!-- Kinetic Elements -->
<div class="absolute top-10 right-10 bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full shadow-lg flex items-center gap-2 active:scale-90 transition-transform cursor-default">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
<span class="font-label-md text-label-md">All Managed</span>
</div>
</div>
<!-- Empty State Typography -->
<div class="text-center space-y-stack-sm max-w-xs">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-primary">All Clear!</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                No pending requests yet. Your family is doing great!
            </p>
</div>
<!-- Action (Optional contextually) -->
<button class="mt-stack-lg px-8 py-4 bg-primary text-on-primary rounded-full font-label-lg text-label-lg shadow-xl hover:opacity-90 active:scale-95 transition-all">
            Send a Reminder
        </button>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-3 pb-safe bg-surface-container-lowest dark:bg-surface-dim shadow-[0_-4px_20px_0_rgba(0,0,0,0.04)] z-50 rounded-t-xl">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-4 py-1 hover:opacity-80 transition-opacity active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-md text-label-md mt-1">Home</span>
</a>
<!-- Requests (Active) -->

</a>

</a>

<span class="material-symbols-outlined">track_changes</span>
<span class="font-label-md text-label-md mt-1">Goals</span>
</a>

<span class="material-symbols-outlined">more_horiz</span>
<span class="font-label-md text-label-md mt-1">More</span>
</a>
</footer>
<!-- Spacer for Bottom Nav -->
<div class="h-24"></div>
<script>
        // Micro-interaction for tabs
        const tabs = document.querySelectorAll('nav button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('tab-active', 'text-primary', 'font-bold');
                    t.classList.add('text-on-surface-variant');
                });
                tab.classList.add('tab-active', 'text-primary', 'font-bold');
                tab.classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
