<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-[24px] shadow-lg active:scale-[0.98] transition-transform">
                Confirm Saving
            </button>
<button class="w-full py-4 text-on-surface-variant font-label-lg text-label-lg hover:text-primary transition-colors" id="closeModal">
                Cancel
            </button>
</div>

<script>
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const overlay = document.getElementById('modalOverlay');
        const sheet = document.getElementById('bottomSheet');

        function toggleModal(open) {
            if (open) {
                overlay.classList.add('active');
                sheet.classList.add('open');
                document.body.style.overflow = 'hidden';
            } else {
                overlay.classList.remove('active');
                sheet.classList.remove('open');
                document.body.style.overflow = 'auto';
            }
        }

        openBtn.addEventListener('click', () => toggleModal(true));
        closeBtn.addEventListener('click', () => toggleModal(false));
        overlay.addEventListener('click', () => toggleModal(false));

        function selectOption(el) {
            const cards = document.querySelectorAll('.allocation-card');
            cards.forEach(c => {
                c.classList.remove('selected');
                const icon = c.querySelector('.ml-auto span');
                if (icon) icon.innerText = 'radio_button_unchecked';
            });
            el.classList.add('selected');
            const activeIcon = el.querySelector('.ml-auto span');
            if (activeIcon) activeIcon.innerText = 'check_circle';
        }

        // Initialize with first selected
        document.querySelectorAll('.allocation-card')[0].classList.add('selected');
        document.querySelectorAll('.allocation-card')[0].querySelector('.ml-auto span').innerText = 'check_circle';

        // Auto open for demonstration
        setTimeout(() => toggleModal(true), 800);
    </script>
