<!DOCTYPE html><html class="light" dir="ltr" lang="en"><head>

                    "primary-fixed": "#d8e2ff",

                    "surface-container-high": "#e7e8e9",

                    "on-tertiary-fixed": "#320047",

                    "on-primary-fixed": "#081b3a",
                    "primary-fixed-dim": "#b6c6ef",
                    "outline-variant": "#c5c6cf",
                    "on-tertiary-container": "#c66ced",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#002204",
                    "surface-container-low": "#f3f4f5",
                    "surface-dim": "#d9dadb",
                    "inverse-primary": "#b6c6ef",
                    "on-tertiary-fixed-variant": "#721199",
                    "surface-tint": "#4e5e81",
                    "surface-variant": "#e1e3e4",
                    "on-surface": "#191c1d",
                    "inverse-surface": "#2e3132",
                    "error-container": "#ffdad6",
                    "tertiary-fixed": "#f8d8ff",
                    "on-background": "#191c1d",
                    "secondary-fixed-dim": "#88d982",
                    "on-secondary": "#ffffff",

            "borderRadius": {

            "spacing": {

<style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .ios-container {
            width: 100%;
            max-width: 393px;
            min-height: 852px;
            margin: 0 auto;
            position: relative;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .soft-card-shadow {
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
        }

        .input-focus-ring:focus-within {
            border-color: #031635;
            box-shadow: 0 0 0 1px #031635;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Safe areas for iPhone 15 Pro */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-surface-container">
<div class="ios-container bg-background">
<!-- Header / Logo Area (Injected from Shared Components Hierarchy) -->
<header class="w-full top-0 sticky bg-background text-primary font-headline-md text-headline-md flex items-center justify-center px-container-margin py-stack-md z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-size: 28px;">account_balance_wallet</span>
<span class="font-display-lg-mobile text-display-lg-mobile tracking-tight">Family Budget</span>
</div>
</header>
<main class="flex-1 flex flex-col items-center px-container-margin safe-top">
<!-- Welcoming Illustration Area -->
<div class="w-full flex flex-col items-center mt-stack-md fade-in" style="animation-delay: 0.1s;">
<div class="relative w-full aspect-square max-w-[280px] flex items-center justify-center">
<img alt="Family Budget Father Welcoming" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMkysqzPXIvC4yiEG5N_5i0kjk8dRGnY4MqZ1zoJWDVRqUU7r_-t612QG9VuIKDHV_nuXdE_q_tbIgifZezo4q5floZp3rmbK8fYxdaKrlBTIM2Eq0nBVSZl1Q-Csosj8_YgSQrpYumRmJxacFEtyjWv3MJ8-1tXVU-GNpJ9j32SpPhlKToOS4EeKWbGRcplt6GO8G_KM7ABEGazkigxoG3GVL1A1Cqrh2nnXvI--hpDPsZFjuJDTfsrJ41DdUwKtSCZgFE7xlMLw">
</div>
<div class="text-center mt-4">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">WELCOME BACK!</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 max-w-[280px] mx-auto">
                        Ready to secure your family's financial future? Sign in to continue.
                    </p>
</div>
</div>
<!-- Login Form -->
<div class="w-full mt-section-padding space-y-stack-md fade-in" style="animation-delay: 0.3s;">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group bg-surface-container-lowest rounded-2xl border border-outline-variant soft-card-shadow transition-all duration-200 input-focus-ring flex items-center px-4 py-3.5">
<span class="material-symbols-outlined text-on-surface-variant mr-3">mail</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant p-0" id="email" placeholder="name@family.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-end ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary-container font-semibold hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative group bg-surface-container-lowest rounded-2xl border border-outline-variant soft-card-shadow transition-all duration-200 input-focus-ring flex items-center px-4 py-3.5">
<span class="material-symbols-outlined text-on-surface-variant mr-3">lock</span>
<input class="bg-transparent border-none outline-none ring-0 w-full font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant p-0" id="password" placeholder="••••••••" type="password">
<button class="ml-2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-2xl mt-stack-lg shadow-lg active:scale-[0.98] transition-all duration-200 hover:opacity-90">
                    Login
                </button>
</div>
<!-- Spacer for bottom elements -->
<div class="mt-auto py-stack-lg flex flex-col items-center gap-4 fade-in" style="animation-delay: 0.5s;">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
<!-- Biometric Hint (Optional modern touch) -->
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full border border-outline-variant/30">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">face</span>
<span class="font-label-md text-label-md text-on-surface-variant">Face ID enabled</span>
</div>
</div>
</main>
<!-- Navigation Suppression: Transactional screen - BottomNavBar excluded by Shell Visibility & Relevance rule -->
<footer class="safe-bottom w-full py-4 text-center">
<div class="w-32 h-1.5 bg-on-surface-variant/20 rounded-full mx-auto"></div>
</footer>
</div>
<script>
        // Micro-interactions for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('shadow-md');
                input.parentElement.style.transform = 'translateY(-2px)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('shadow-md');
                input.parentElement.style.transform = 'translateY(0)';
            });
        });

        // Toggle Password Visibility
        const visibilityBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        visibilityBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            visibilityBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
