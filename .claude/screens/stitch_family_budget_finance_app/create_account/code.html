<!-- Create Account Form -->
<form class="space-y-stack-md" id="signup-form" onsubmit="event.preventDefault()">
<div class="grid grid-cols-2 gap-gutter">
<!-- First Name -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">First Name</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 card-shadow input-focus-effect transition-all duration-200">
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md text-on-surface" placeholder="Jane" type="text">
</div>
</div>
<!-- Last Name -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Last Name</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 card-shadow input-focus-effect transition-all duration-200">
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md text-on-surface" placeholder="Doe" type="text">
</div>
</div>
</div>
<!-- Email -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Email Address</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 card-shadow input-focus-effect transition-all duration-200">

<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md text-on-surface" placeholder="jane.doe@example.com" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Password</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 card-shadow input-focus-effect transition-all duration-200">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]">lock</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md text-on-surface" placeholder="••••••••" type="password">
<button class="text-outline-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1">Confirm Password</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-xl px-4 py-3 card-shadow input-focus-effect transition-all duration-200">
<span class="material-symbols-outlined text-outline-variant mr-3 text-[20px]">shield</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-body-md text-on-surface" placeholder="••••••••" type="password">
</div>
</div>

<div class="pt-stack-md space-y-4">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-full card-shadow active:scale-95 transition-transform duration-200" type="submit">
                    Create Account

<script>
        // Simple Interaction logic
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/10', 'border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/10', 'border-primary');
            });
        });

        // Toggle password visibility (simplified)
        const togglePass = document.querySelector('button span[data-icon="visibility"]');
        if(togglePass) {
            togglePass.parentElement.addEventListener('click', () => {
                const input = togglePass.parentElement.previousElementSibling;
                if(input.type === "password") {
                    input.type = "text";
                    togglePass.innerText = "visibility_off";
                } else {
                    input.type = "password";
                    togglePass.innerText = "visibility";
                }
            });
        }
    </script>
